<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio - SuperDaddyChris</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(5, 5, 5, 0.95);
      border-bottom: 1px solid #222;
      padding: 16px 20px;
      text-align: center;
    }

    nav a {
      color: #ddd;
      text-decoration: none;
      margin: 8px 12px;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: inline-block;
    }

    nav a:hover {
      color: #ff3333;
    }

    .bio-page {
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 0, 60, 0.14), transparent 35%),
        radial-gradient(circle at bottom, rgba(0, 120, 255, 0.12), transparent 35%),
        #000;
      padding: 30px 12px 60px;
    }

    .bio-wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .bio-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 35px rgba(255, 0, 60, 0.18),
                  0 0 60px rgba(0, 120, 255, 0.14);
    }

    .bio-caption {
      text-align: center;
      margin-top: 28px;
      color: #aaa;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      nav {
        padding: 12px 8px;
      }

      nav a {
        font-size: 12px;
        margin: 6px;
      }

      .bio-page {
        padding: 18px 8px 40px;
      }

      .bio-image {
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">Bio</a>
    <a href="media.html">Media</a>
    <a href="lyrics.html">Lyrics</a>
    <a href="news.html">News</a>
    <a href="https://superdaddychris-shop.fourthwall.com/" target="_blank">Merch</a>
    <a href="press.html">Press Kit</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main class="bio-page">
    <div class="bio-wrap">

      <!-- background -->
      <!-- Then make sure the file name below matches your image file name exactly -->
      <img
        class="bio-image"
        src="superdaddychris-bio-page.png"
        alt="SuperDaddyChris official biography page"
      />

      <div class="bio-caption">
        SuperDaddyChris — Create. Connect. Leave A Legacy.
      </div>

    </div>
  </main>

</body>
</html>
