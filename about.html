<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SuperDaddyChris - Recording Artist, Content Creator, Videographer & U.S. Army Servicemember" />
  <title>SuperDaddyChris | Official Bio</title>
  <style>
    :root {
      --bg: #050505;
      --card: rgba(15, 15, 18, 0.95);
      --card2: rgba(25, 25, 32, 0.9);
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --red: #ff2b2b;
      --blue: #249cff;
      --purple: #a855f7;
      --green: #39d353;
      --border: rgba(255, 255, 255, 0.1);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    /* NAV */
    .nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 7%;
      background: rgba(5, 5, 8, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .logo-main {
      font-size: clamp(22px, 2.4vw, 32px);
      font-weight: 900;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #fff, var(--red), #fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .nav-links a {
      color: rgba(255,255,255,0.85);
      transition: all 0.2s ease;
    }
    .nav-links a:hover {
      color: var(--red);
      text-shadow: 0 0 12px rgba(255,43,43,0.4);
    }

    /* HERO */
    .hero {
      display: grid;
      grid-template-columns: minmax(300px, 42%) 1fr;
      min-height: 620px;
      padding: 60px 7% 40px;
      gap: 48px;
      align-items: center;
    }
    .hero-photo {
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      background: #0a0a0a;
    }
    .hero-photo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .hero-content h1 {
      font-size: clamp(56px, 8.5vw, 118px);
      line-height: 0.92;
      letter-spacing: -5px;
      text-transform: uppercase;
      font-weight: 900;
    }
    .hero-content .red { color: var(--red); }

    .role-line {
      color: var(--red);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 24px 0 18px;
    }

    .social-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }
    .social-bar a {
      padding: 14px 22px;
      border: 1px solid var(--border);
      border-radius: 9999px;
      background: rgba(255,255,255,0.04);
      font-weight: 700;
      font-size: 13px;
      transition: all 0.25s ease;
    }
    .social-bar a:hover {
      background: var(--red);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255,43,43,0.3);
    }

    /* BIO PANEL */
    .bio-panel {
      width: 88%;
      max-width: 1480px;
      margin: 0 auto 60px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(8, 8, 11, 0.96);
      overflow: hidden;
      box-shadow: 0 40px 90px rgba(0,0,0,0.65);
    }

    .panel-header {
      padding: 36px 40px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(255,43,43,0.1), transparent);
    }

    /* Timeline */
    .timeline-row {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      padding: 32px 40px;
      border-top: 1px solid var(--border);
    }

    .number {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      color: white;
      box-shadow: 0 0 20px currentColor;
    }

    .slot {
      flex: 0 0 clamp(260px, 30vw, 340px);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .slot:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .video-wrap {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: #000;
    }
    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .hero, .timeline-row { grid-template-columns: 1fr; }
      .bio-panel { width: 94%; }
    }

    @media (max-width: 700px) {
      .nav { padding: 14px 5%; flex-direction: column; gap: 16px; }
      .timeline-row { padding: 24px 5%; gap: 20px; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="logo">
      <div class="logo-main">SuperDaddyChris</div>
      <div class="logo-sub">Official Bio</div>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">Bio</a>
      <a href="media.html">Media</a>
      <a href="lyrics.html">Lyrics</a>
      <a href="news.html">News</a>
      <a href="https://superdaddychris-shop.fourthwall.com/" target="_blank">Merch</a>
      <a href="press.html">Press</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- HERO + REST OF YOUR CONTENT -->
  <!-- (I kept your content structure but you can paste the rest here) -->

  <footer style="text-align:center; padding:40px 20px; color:var(--muted); font-size:13px;">
    Building • Creating • Inspiring © 2026 SuperDaddyChris
  </footer>

  <script>
    // Simple active tab script (your archive tabs)
    document.querySelectorAll('.archive-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.archive-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
